<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StrategyScale</title>
    <style>
      :root {
        --bg: #0e1116;
        --panel: #161b22;
        --panel-2: #1c222b;
        --border: #2a313c;
        --border-soft: #232a34;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #c9a86a;
        --accent-hover: #d6b884;
        --accent-soft: rgba(201, 168, 106, 0.12);
        --error: #f85149;
        --error-soft: rgba(248, 81, 73, 0.10);
        --go: #56d364;
        --pivot: #d6905b;
        --pivot-soft: rgba(214, 144, 91, 0.14);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        background: var(--bg); color: var(--text);
        font-family: ui-serif, Georgia, "Times New Roman", serif;
        font-size: 17px; line-height: 1.55;
      }
      .wrap { max-width: 760px; margin: 0 auto; padding: 64px 24px 96px; }

      /* Persistent context bar */
      .context-bar {
        position: sticky; top: 0;
        background: var(--bg);
        border-bottom: 1px solid var(--border-soft);
        padding: 12px 24px;
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 13px; color: var(--muted);
        z-index: 10;
        display: flex; align-items: center; gap: 16px;
      }
      .context-bar .label {
        color: var(--accent); letter-spacing: 0.14em; text-transform: uppercase;
        font-size: 11px;
      }
      .context-bar .qtext {
        flex: 1; min-width: 0;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .context-bar .mode-tag {
        background: var(--accent-soft); color: var(--accent);
        padding: 3px 10px; border-radius: 3px;
        font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
        white-space: nowrap;
      }
      .context-bar .restart {
        color: var(--muted); text-decoration: none;
        border: 1px solid var(--border); padding: 3px 10px; border-radius: 3px;
      }
      .context-bar .restart:hover { color: var(--text); border-color: var(--accent); }

      /* Header */
      header.brand-header { margin-bottom: 28px; }
      .brand {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase;
        color: var(--accent); margin-bottom: 12px;
      }
      h1 { font-size: 32px; font-weight: 500; line-height: 1.2; margin: 0 0 8px; }
      h2 { font-size: 22px; font-weight: 500; margin: 0 0 6px; line-height: 1.3; }
      h3 {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--muted); font-weight: 500;
        margin: 32px 0 16px;
      }
      .sub { color: var(--muted); font-size: 15px; font-family: ui-sans-serif, system-ui, sans-serif; }
      .stage-label {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
        color: var(--accent); margin-bottom: 8px;
      }

      /* Resume banner */
      .resume-banner {
        background: var(--accent-soft); border: 1px solid var(--accent);
        border-radius: 6px; padding: 16px 20px; margin-bottom: 32px;
        font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px;
      }
      .resume-banner strong { color: var(--accent-hover); }
      .resume-banner .resume-q {
        display: block; color: var(--text); font-style: italic;
        margin: 8px 0 14px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .resume-banner .actions { margin-top: 0; }

      /* Decision mode picker */
      .mode-picker { margin: 0 0 24px; }
      .mode-picker .mode-label {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--muted); margin-bottom: 10px;
      }
      .mode-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 8px;
      }
      .mode-chip {
        background: var(--panel); border: 1px solid var(--border);
        color: var(--text);
        padding: 10px 14px; border-radius: 4px;
        font-family: ui-sans-serif, system-ui, sans-serif; font-size: 13px;
        cursor: pointer; text-align: left;
        transition: all 0.12s ease;
      }
      .mode-chip:hover { border-color: var(--accent); }
      .mode-chip.selected {
        border-color: var(--accent); background: var(--accent-soft);
        color: var(--accent-hover); font-weight: 600;
      }

      /* Form */
      textarea {
        width: 100%; min-height: 140px;
        padding: 16px 18px;
        background: var(--panel); color: var(--text);
        border: 1px solid var(--border); border-radius: 6px;
        font-family: inherit; font-size: 17px; line-height: 1.55;
        resize: vertical;
      }
      textarea:focus { outline: none; border-color: var(--accent); }
      textarea.small { min-height: 80px; font-size: 16px; }

      .actions {
        display: flex; align-items: center; gap: 12px;
        margin-top: 18px; flex-wrap: wrap;
      }
      button {
        background: var(--accent); color: #0e1116; border: 0;
        padding: 11px 22px;
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 14px; font-weight: 600;
        letter-spacing: 0.04em; text-transform: uppercase;
        border-radius: 4px; cursor: pointer;
        transition: background 0.15s ease;
      }
      button:hover:not(:disabled) { background: var(--accent-hover); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button.secondary {
        background: transparent; color: var(--text);
        border: 1px solid var(--border);
      }
      button.secondary:hover:not(:disabled) {
        border-color: var(--accent); color: var(--accent);
      }
      .hint {
        font-size: 13px; color: var(--muted);
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      /* Field rendering */
      .field { padding: 20px 0; border-top: 1px solid var(--border); }
      .field:first-child { border-top: 0; }
      .field .label {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--accent); margin-bottom: 8px;
      }
      .field p { margin: 0; }

      .followup {
        background: var(--panel); border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        padding: 18px 20px; margin-top: 24px; border-radius: 4px;
      }
      .followup .label { margin-bottom: 6px; }

      .banner {
        background: var(--accent-soft); border: 1px solid var(--accent);
        padding: 12px 16px; border-radius: 4px;
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 13px; color: var(--accent);
        margin-bottom: 24px;
      }
      .banner strong { color: var(--accent-hover); }

      /* Thinking Frame view */
      .thinking-block {
        background: var(--panel); border: 1px solid var(--border-soft);
        border-radius: 6px; padding: 8px 24px; margin: 0 0 28px;
      }
      .thinking-block .field { padding: 16px 0; border-color: var(--border-soft); }

      /* Iterative pressure test */
      .batch-progress {
        display: flex; gap: 10px; align-items: center;
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--muted); margin-bottom: 18px;
      }
      .batch-progress .pip {
        width: 22px; height: 4px; border-radius: 2px;
        background: var(--border);
      }
      .batch-progress .pip.done { background: var(--accent); }
      .batch-progress .pip.active { background: var(--accent-hover); }

      .update-block {
        background: var(--panel); border: 1px solid var(--border-soft);
        border-radius: 6px; padding: 4px 22px; margin: 0 0 24px;
      }
      .update-block .field { padding: 14px 0; border-color: var(--border-soft); }

      .pivot-callout {
        background: var(--pivot-soft); border: 1px solid var(--pivot);
        border-left: 4px solid var(--pivot);
        padding: 14px 18px; border-radius: 4px; margin: 0 0 20px;
      }
      .pivot-callout .pivot-tag {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
        color: var(--pivot); margin-bottom: 6px; font-weight: 700;
      }
      .pivot-callout p { margin: 0; }

      .narrowed-tag {
        display: inline-block;
        background: var(--accent-soft); color: var(--accent);
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
        padding: 2px 8px; border-radius: 3px; margin-left: 10px;
        vertical-align: middle;
      }

      .question-card {
        background: var(--panel-2); border: 1px solid var(--border-soft);
        border-left: 3px solid var(--accent);
        padding: 18px 20px; margin-bottom: 16px; border-radius: 4px;
      }
      .lever-badge {
        display: inline-block;
        background: var(--accent-soft); color: var(--accent);
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
        padding: 3px 10px; border-radius: 3px; margin-bottom: 10px;
      }
      .question-card .qtext-full { margin: 0 0 12px; font-size: 16px; }

      /* Errors / loading */
      .error {
        color: var(--error);
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 14px; margin-top: 24px;
      }
      .loading {
        color: var(--muted); font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 14px; font-style: italic; margin-top: 32px;
      }

      /* Final recommendation */
      .final-grid .field-major {
        background: var(--panel); border: 1px solid var(--accent);
        padding: 22px 24px; border-radius: 6px; margin-bottom: 24px;
      }
      .final-grid .field-major .label {
        color: var(--accent); font-size: 12px; letter-spacing: 0.16em;
        text-transform: uppercase; font-family: ui-sans-serif, system-ui, sans-serif;
        margin-bottom: 10px;
      }
      .final-grid .field-major p { margin: 0; font-size: 18px; }

      .plan-grid {
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 6px; padding: 4px 20px; margin: 0 0 24px;
      }

      .criteria-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
        margin-bottom: 24px;
      }
      .criteria-grid .crit {
        background: var(--panel-2); border: 1px solid var(--border-soft);
        padding: 16px 18px; border-radius: 4px;
      }
      .criteria-grid .crit.go { border-left: 3px solid var(--go); }
      .criteria-grid .crit.stop { border-left: 3px solid var(--error); }
      .criteria-grid .label {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
        margin-bottom: 8px;
      }
      .criteria-grid .crit.go .label { color: var(--go); }
      .criteria-grid .crit.stop .label { color: var(--error); }
      .criteria-grid p { margin: 0; }

      .change-trigger {
        background: var(--panel-2); border: 1px dashed var(--accent);
        padding: 18px 22px; border-radius: 6px; margin-bottom: 24px;
      }
      .change-trigger .label {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--accent); margin-bottom: 8px;
      }
      .change-trigger p { margin: 0; }

      .memory-summary {
        background: var(--panel-2); border: 1px dashed var(--border);
        padding: 24px 28px; border-radius: 6px; margin-top: 32px;
      }
      .memory-summary .memory-header {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
        color: var(--muted); margin: 0 0 18px;
        display: flex; align-items: center; gap: 10px;
      }
      .memory-summary .memory-header::before {
        content: ""; display: inline-block;
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--accent);
      }
      .memory-summary .field {
        padding: 12px 0; border-color: var(--border-soft);
      }

      @media (max-width: 600px) {
        .criteria-grid { grid-template-columns: 1fr; }
        .context-bar { flex-wrap: wrap; }
      }
    </style>
  </head>
  <body>
    <div id="context-bar"></div>
    <div class="wrap" id="app"></div>

    <script>
      // ─── Config ─────────────────────────────────────────────────────────
      const STORAGE_KEY = "strategyscale.journey";
      const MEMORY_KEY = "strategyscale.lastMemory";
      const STATE_VERSION = 3; // bump when state shape changes
      const MAX_BATCHES = 3;

      const DECISION_MODES = [
        "market_entry",
        "pricing_strategy",
        "product_market_fit",
        "growth_constraint",
        "hiring_team",
        "fundraising_capital_allocation",
        "exit_succession",
        "other",
      ];
      const MODE_LABELS = {
        market_entry: "Market entry",
        pricing_strategy: "Pricing strategy",
        product_market_fit: "Product–market fit",
        growth_constraint: "Growth constraint",
        hiring_team: "Hiring / team",
        fundraising_capital_allocation: "Fundraising / capital",
        exit_succession: "Exit / succession",
        other: "Other / free text",
      };

      // ─── State ──────────────────────────────────────────────────────────
      function freshState() {
        return {
          version: STATE_VERSION,
          view: "INPUT", // INPUT | INSTANT | THINKING | PRESSURE_TEST | FINAL
          loading: false,
          loadingMsg: "",
          error: null,
          question: "",
          selectedMode: "other",
          instantView: null,
          thinkingFrame: null,
          // batches: [
          //   {
          //     questions: [{question, decision_lever}],
          //     answers: [string],
          //     update: null | {
          //       what_we_now_know, still_uncertain,
          //       framing_status, framing_change_explanation,
          //       decision, reason
          //     }
          //   }
          // ]
          batches: [],
          finalRec: null,
          savedJourney: null, // not persisted
        };
      }
      let state = freshState();

      // ─── Persistence ────────────────────────────────────────────────────
      function persist() {
        try {
          const { savedJourney, loading, loadingMsg, error, ...persistable } = state;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(persistable));
        } catch {}
      }
      function loadSaved() {
        try {
          const s = localStorage.getItem(STORAGE_KEY);
          if (!s) return null;
          const obj = JSON.parse(s);
          if (!obj || obj.version !== STATE_VERSION) return null;
          if (!obj.question || !obj.view) return null;
          return obj;
        } catch { return null; }
      }
      function clearSaved() {
        try { localStorage.removeItem(STORAGE_KEY); } catch {}
      }
      function persistMemory(mem) {
        try { localStorage.setItem(MEMORY_KEY, JSON.stringify(mem)); } catch {}
      }

      // ─── Utils ──────────────────────────────────────────────────────────
      function escapeHtml(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }
      function paragraphs(s) {
        return escapeHtml(s).replace(/\n+/g, "</p><p>");
      }
      async function postJSON(url, body) {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        return data;
      }
      function activeMode() {
        return state.instantView?.detected_mode || state.selectedMode;
      }
      function captureCurrentAnswers() {
        const inputs = document.querySelectorAll("textarea[data-q]");
        if (!inputs.length || !state.batches.length) return;
        const last = state.batches[state.batches.length - 1];
        last.answers = Array.from(inputs).map((t) => t.value);
      }

      // ─── State transitions ──────────────────────────────────────────────
      async function submitDecision(question) {
        state.question = question;
        state.loading = true;
        state.loadingMsg = "Reading your decision...";
        state.error = null;
        render();
        try {
          state.instantView = await postJSON("/api/instant-view", {
            question,
            mode: state.selectedMode,
          });
          state.view = "INSTANT";
          persist();
        } catch (e) {
          state.error = e.message;
        } finally {
          state.loading = false;
          render();
        }
      }

      async function startDiagnostic() {
        state.loading = true;
        state.loadingMsg = "Selecting framework and drafting batch 1...";
        state.error = null;
        render();
        try {
          const result = await postJSON("/api/diagnostic/start", {
            question: state.question,
            mode: activeMode(),
            instantView: state.instantView,
          });
          // Split: thinking-frame fields vs. first batch questions
          const { pressure_test_questions, ...frame } = result;
          state.thinkingFrame = frame;
          state.batches = [
            {
              questions: pressure_test_questions,
              answers: pressure_test_questions.map(() => ""),
              update: null,
            },
          ];
          state.view = "THINKING";
          persist();
        } catch (e) {
          state.error = e.message;
        } finally {
          state.loading = false;
          render();
        }
      }

      function showFirstBatch() {
        state.view = "PRESSURE_TEST";
        persist();
        render();
      }

      async function submitBatch() {
        captureCurrentAnswers();
        state.loading = true;
        state.loadingMsg = "Reading your answers, deciding next step...";
        state.error = null;
        render();
        try {
          const update = await postJSON("/api/diagnostic/iterate", {
            question: state.question,
            mode: activeMode(),
            instantView: state.instantView,
            thinkingFrame: state.thinkingFrame,
            batches: state.batches,
          });
          // Strip next_questions onto its own thing; the rest is the update.
          const { next_questions, ...rest } = update;
          state.batches[state.batches.length - 1].update = rest;
          if (rest.decision === "continue" && Array.isArray(next_questions) && next_questions.length > 0) {
            state.batches.push({
              questions: next_questions,
              answers: next_questions.map(() => ""),
              update: null,
            });
            persist();
            state.loading = false;
            render();
          } else {
            // Finalise
            persist();
            await produceFinal();
          }
        } catch (e) {
          state.error = e.message;
          state.loading = false;
          render();
        }
      }

      async function wrapUpNow() {
        captureCurrentAnswers();
        await produceFinal();
      }

      async function produceFinal() {
        state.loading = true;
        state.loadingMsg = "Producing the final recommendation...";
        state.error = null;
        state.view = "FINAL";
        render();
        try {
          state.finalRec = await postJSON("/api/final", {
            question: state.question,
            mode: activeMode(),
            instantView: state.instantView,
            thinkingFrame: state.thinkingFrame,
            batches: state.batches,
          });
          if (state.finalRec.memory_summary) {
            persistMemory(state.finalRec.memory_summary);
          }
          persist();
        } catch (e) {
          state.error = e.message;
          state.view = "PRESSURE_TEST";
        } finally {
          state.loading = false;
          render();
        }
      }

      function restart() {
        clearSaved();
        state = freshState();
        render();
      }

      function continueSaved() {
        const saved = state.savedJourney;
        if (!saved) return;
        state = { ...freshState(), ...saved, savedJourney: null };
        render();
      }

      function discardSaved() {
        clearSaved();
        state.savedJourney = null;
        render();
      }

      function selectMode(mode) {
        state.selectedMode = mode;
        render();
      }

      // ─── Rendering ──────────────────────────────────────────────────────
      function renderContextBar() {
        const bar = document.getElementById("context-bar");
        if (state.view === "INPUT") {
          bar.innerHTML = "";
          bar.style.display = "none";
          return;
        }
        bar.style.display = "flex";
        bar.className = "context-bar";
        const detected = state.instantView?.detected_mode;
        const modeTag = detected
          ? `<span class="mode-tag">${escapeHtml(MODE_LABELS[detected] || detected)}</span>`
          : "";
        bar.innerHTML = `
          <span class="label">Decision</span>
          <span class="qtext" title="${escapeHtml(state.question)}">${escapeHtml(state.question)}</span>
          ${modeTag}
          <a href="#" class="restart" id="restart-link">Start over</a>
        `;
        document.getElementById("restart-link").addEventListener("click", (e) => {
          e.preventDefault();
          if (confirm("Start over? Current decision will be cleared.")) restart();
        });
      }

      function renderResumeBanner() {
        if (!state.savedJourney) return "";
        const sj = state.savedJourney;
        const stageLabels = {
          INSTANT: "Instant view ready",
          THINKING: "Thinking frame ready",
          PRESSURE_TEST: `Mid pressure-test (batch ${sj.batches?.length || 1} of ${MAX_BATCHES})`,
          FINAL: "Final recommendation ready",
        };
        return `
          <div class="resume-banner">
            <strong>You have an unfinished decision.</strong> Stage: ${escapeHtml(stageLabels[sj.view] || sj.view)}.
            <span class="resume-q">"${escapeHtml(sj.question)}"</span>
            <div class="actions">
              <button id="resume-continue">Continue</button>
              <button class="secondary" id="resume-discard">Discard and start fresh</button>
            </div>
          </div>
        `;
      }

      function renderModePicker() {
        const chips = DECISION_MODES.map((m) => `
          <button type="button" class="mode-chip ${state.selectedMode === m ? "selected" : ""}" data-mode="${m}">
            ${escapeHtml(MODE_LABELS[m])}
          </button>
        `).join("");
        return `
          <div class="mode-picker">
            <div class="mode-label">Decision mode</div>
            <div class="mode-grid">${chips}</div>
          </div>
        `;
      }

      function renderInput() {
        return `
          ${renderResumeBanner()}
          <header class="brand-header">
            <div class="brand">StrategyScale</div>
            <h1>What strategic decision are you trying to make?</h1>
            <div class="sub">Be specific. Vague inputs get pushed back, not flattered.</div>
          </header>
          ${renderModePicker()}
          <form id="form">
            <textarea
              id="question"
              placeholder="e.g. Whether to acquire our smaller German competitor for €45m, or build the same capability in-house over 18 months."
              autofocus required
            >${escapeHtml(state.question)}</textarea>
            <div class="actions">
              <button type="submit" id="submit">Get instant view</button>
              <span class="hint">Cmd/Ctrl + Enter to submit</span>
            </div>
          </form>
          ${renderError()}
        `;
      }

      function renderInstant() {
        const v = state.instantView;
        return `
          <div class="stage-label">Stage 1 · Instant view</div>
          <h2>Provisional read</h2>
          <div class="banner"><strong>Provisional.</strong> Based only on your opening brief. Take it in, then go deeper to refine it.</div>
          <div class="field"><div class="label">Provisional position</div><p>${paragraphs(v.provisional_position)}</p></div>
          <div class="field"><div class="label">Single dominant constraint</div><p>${paragraphs(v.dominant_constraint)}</p></div>
          <div class="field"><div class="label">Assumption to test</div><p>${paragraphs(v.assumption_to_test)}</p></div>
          <div class="followup">
            <div class="label">Immediate next move</div>
            <p>${paragraphs(v.immediate_next_move)}</p>
          </div>
          <div class="actions">
            <button id="go-deeper">Take me deeper</button>
            <button class="secondary" id="have-enough">I have what I need</button>
          </div>
          ${renderError()}
        `;
      }

      function renderThinking() {
        if (state.loading) return `<div class="stage-label">Stage 2 · Thinking frame</div><div class="loading">${escapeHtml(state.loadingMsg)}</div>`;
        const t = state.thinkingFrame;
        if (!t) return renderError();
        return `
          <div class="stage-label">Stage 2 · Thinking frame</div>
          <h2>Why these questions, in this order</h2>
          <div class="thinking-block">
            <div class="field"><div class="label">Problem type</div><p>${paragraphs(t.problem_type)}</p></div>
            <div class="field"><div class="label">Framework selected</div><p>${paragraphs(t.framework_selected)}</p></div>
            <div class="field"><div class="label">Why this framework fits</div><p>${paragraphs(t.why_framework_fits)}</p></div>
            <div class="field"><div class="label">Key tension</div><p>${paragraphs(t.key_tension)}</p></div>
            <div class="field"><div class="label">Critical unknown</div><p>${paragraphs(t.critical_unknown)}</p></div>
            <div class="field"><div class="label">Why these questions matter</div><p>${paragraphs(t.why_these_questions_matter)}</p></div>
          </div>
          <div class="actions">
            <button id="show-questions">Show me the questions</button>
          </div>
          ${renderError()}
        `;
      }

      function renderBatchProgress(currentIdx) {
        const pips = [];
        for (let i = 0; i < MAX_BATCHES; i++) {
          const cls = i < currentIdx ? "done" : i === currentIdx ? "active" : "";
          pips.push(`<span class="pip ${cls}"></span>`);
        }
        return `<div class="batch-progress">Batch ${currentIdx + 1} of max ${MAX_BATCHES} ${pips.join("")}</div>`;
      }

      function renderUpdateBlock(update) {
        if (!update) return "";
        const pivot = update.framing_status === "pivoted"
          ? `<div class="pivot-callout">
               <div class="pivot-tag">Framing pivoted — we are solving a different problem</div>
               <p>${paragraphs(update.framing_change_explanation)}</p>
             </div>`
          : "";
        const narrowedTag = update.framing_status === "narrowed"
          ? `<span class="narrowed-tag">Framing narrowed</span>`
          : "";
        return `
          ${pivot}
          <div class="update-block">
            <div class="field"><div class="label">What we now know${narrowedTag}</div><p>${paragraphs(update.what_we_now_know)}</p></div>
            <div class="field"><div class="label">Still uncertain</div><p>${paragraphs(update.still_uncertain)}</p></div>
            <div class="field"><div class="label">Why we are continuing</div><p>${paragraphs(update.reason)}</p></div>
          </div>
        `;
      }

      function renderPressureTest() {
        if (!state.batches.length) return renderError();
        const idx = state.batches.length - 1;
        const batch = state.batches[idx];
        const previousUpdate = idx > 0 ? state.batches[idx - 1].update : null;
        const isLastAllowed = idx === MAX_BATCHES - 1;

        const questionsHtml = batch.questions.map((q, i) => `
          <div class="question-card">
            <div class="lever-badge">${escapeHtml(q.decision_lever)}</div>
            <p class="qtext-full">${escapeHtml(q.question)}</p>
            <textarea class="small" data-q="${i}" placeholder="Your answer (or leave blank — that's a signal too)">${escapeHtml(batch.answers[i] || "")}</textarea>
          </div>
        `).join("");

        const headline = idx === 0
          ? `<h2>${batch.questions.length} opening questions</h2>`
          : `<h2>${batch.questions.length} sharper questions${isLastAllowed ? ` (final batch)` : ""}</h2>`;

        return `
          <div class="stage-label">Stage 3 · Pressure test</div>
          ${renderBatchProgress(idx)}
          ${headline}
          ${renderUpdateBlock(previousUpdate)}
          ${questionsHtml}
          <div class="actions">
            <button id="submit-batch" ${state.loading ? "disabled" : ""}>${state.loading ? "Thinking..." : (isLastAllowed ? "Submit answers — generate final" : "Submit answers")}</button>
            <button class="secondary" id="wrap-up" ${state.loading ? "disabled" : ""}>Wrap up — give me the final now</button>
          </div>
          ${state.loading ? `<div class="loading">${escapeHtml(state.loadingMsg)}</div>` : ""}
          ${renderError()}
        `;
      }

      function renderFinal() {
        if (state.loading || !state.finalRec) {
          return `<div class="stage-label">Stage 4 · Final recommendation</div><div class="loading">${escapeHtml(state.loadingMsg || "Working...")}</div>${renderError()}`;
        }
        const f = state.finalRec;
        const m = f.memory_summary || {};
        return `
          <div class="stage-label">Stage 4 · Final recommendation</div>
          <h2>The call</h2>
          <div class="final-grid">
            <div class="field-major">
              <div class="label">Decision</div>
              <p>${paragraphs(f.decision)}</p>
            </div>
            <div class="field"><div class="label">Rationale</div><p>${paragraphs(f.rationale)}</p></div>
            <div class="field"><div class="label">Trade-offs you accept</div><p>${paragraphs(f.tradeoffs)}</p></div>
            <div class="field"><div class="label">Cost of inaction</div><p>${paragraphs(f.cost_of_inaction)}</p></div>

            <h3>90-day plan</h3>
            <div class="plan-grid">
              <div class="field"><div class="label">First 30 days</div><p>${paragraphs(f.plan_30_day)}</p></div>
              <div class="field"><div class="label">Days 30–60</div><p>${paragraphs(f.plan_60_day)}</p></div>
              <div class="field"><div class="label">Days 60–90</div><p>${paragraphs(f.plan_90_day)}</p></div>
            </div>

            <h3>Decision rails</h3>
            <div class="criteria-grid">
              <div class="crit go"><div class="label">Go criteria</div><p>${paragraphs(f.go_criteria)}</p></div>
              <div class="crit stop"><div class="label">Stop criteria</div><p>${paragraphs(f.stop_criteria)}</p></div>
            </div>

            <div class="change-trigger">
              <div class="label">What would change the decision</div>
              <p>${paragraphs(f.what_would_change_the_decision)}</p>
            </div>

            <div class="memory-summary">
              <div class="memory-header">What StrategyScale will remember next time</div>
              <div class="field"><div class="label">Stated goal</div><p>${paragraphs(m.stated_goal)}</p></div>
              <div class="field"><div class="label">Business context</div><p>${paragraphs(m.business_context)}</p></div>
              <div class="field"><div class="label">Key constraints</div><p>${paragraphs(m.key_constraints)}</p></div>
              <div class="field"><div class="label">Evidence gaps</div><p>${paragraphs(m.evidence_gaps)}</p></div>
              <div class="field"><div class="label">Next decision gate</div><p>${paragraphs(m.next_decision_gate)}</p></div>
            </div>
          </div>
          <div class="actions">
            <button class="secondary" id="restart-final">Run another decision</button>
          </div>
        `;
      }

      function renderError() {
        return state.error ? `<div class="error">${escapeHtml(state.error)}</div>` : "";
      }
      function renderLoading() {
        return `<div class="loading">${escapeHtml(state.loadingMsg)}</div>`;
      }

      function render() {
        renderContextBar();
        const app = document.getElementById("app");
        let html = "";
        if (state.view === "INPUT") {
          html = state.loading ? renderLoading() : renderInput();
        } else if (state.view === "INSTANT") {
          html = state.loading ? renderLoading() : renderInstant();
        } else if (state.view === "THINKING") {
          html = renderThinking();
        } else if (state.view === "PRESSURE_TEST") {
          html = renderPressureTest();
        } else if (state.view === "FINAL") {
          html = renderFinal();
        }
        app.innerHTML = html;
        wireHandlers();
      }

      // ─── Event wiring (re-bound after every render) ─────────────────────
      function wireHandlers() {
        document.querySelectorAll(".mode-chip").forEach((el) => {
          el.addEventListener("click", () => selectMode(el.dataset.mode));
        });

        const cont = document.getElementById("resume-continue");
        if (cont) cont.addEventListener("click", continueSaved);
        const disc = document.getElementById("resume-discard");
        if (disc) disc.addEventListener("click", discardSaved);

        const form = document.getElementById("form");
        if (form) {
          const ta = document.getElementById("question");
          ta.addEventListener("keydown", (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === "Enter") form.requestSubmit();
          });
          form.addEventListener("submit", (e) => {
            e.preventDefault();
            const q = ta.value.trim();
            if (q.length < 10) return;
            submitDecision(q);
          });
        }

        const goDeeper = document.getElementById("go-deeper");
        if (goDeeper) goDeeper.addEventListener("click", startDiagnostic);
        const haveEnough = document.getElementById("have-enough");
        if (haveEnough) haveEnough.addEventListener("click", () => {
          alert("Right — instant view is your answer. Take it to the board.");
        });

        const showQ = document.getElementById("show-questions");
        if (showQ) showQ.addEventListener("click", showFirstBatch);

        const submitB = document.getElementById("submit-batch");
        if (submitB) submitB.addEventListener("click", submitBatch);
        const wrapUp = document.getElementById("wrap-up");
        if (wrapUp) wrapUp.addEventListener("click", wrapUpNow);

        const restartF = document.getElementById("restart-final");
        if (restartF) restartF.addEventListener("click", restart);
      }

      // ─── Boot ───────────────────────────────────────────────────────────
      function boot() {
        const saved = loadSaved();
        if (saved && saved.view !== "INPUT") {
          state.savedJourney = saved;
        }
        render();
      }
      boot();
    </script>
  </body>
</html>

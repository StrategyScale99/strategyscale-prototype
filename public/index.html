<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StrategyScale</title>
    <style>
      :root {
        --bg: #0e1116;
        --panel: #161b22;
        --panel-2: #1c222b;
        --border: #2a313c;
        --border-soft: #232a34;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #c9a86a;
        --accent-hover: #d6b884;
        --accent-soft: rgba(201, 168, 106, 0.12);
        --error: #f85149;
        --error-soft: rgba(248, 81, 73, 0.10);
        --go: #56d364;
        --pivot: #d6905b;
        --pivot-soft: rgba(214, 144, 91, 0.14);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        background: var(--bg); color: var(--text);
        font-family: ui-serif, Georgia, "Times New Roman", serif;
        font-size: 17px; line-height: 1.55;
      }
      .wrap { max-width: 760px; margin: 0 auto; padding: 64px 24px 96px; }

      /* Persistent context bar */
      .context-bar {
        position: sticky; top: 0;
        background: var(--bg);
        border-bottom: 1px solid var(--border-soft);
        padding: 12px 24px;
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 13px; color: var(--muted);
        z-index: 10;
        display: flex; align-items: center; gap: 16px;
      }
      .context-bar .label {
        color: var(--accent); letter-spacing: 0.14em; text-transform: uppercase;
        font-size: 11px;
      }
      .context-bar .qtext {
        flex: 1; min-width: 0;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .context-bar .mode-tag {
        background: var(--accent-soft); color: var(--accent);
        padding: 3px 10px; border-radius: 3px;
        font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
        white-space: nowrap;
      }
      .context-bar .restart {
        color: var(--muted); text-decoration: none;
        border: 1px solid var(--border); padding: 3px 10px; border-radius: 3px;
      }
      .context-bar .restart:hover { color: var(--text); border-color: var(--accent); }

      /* Header */
      header.brand-header { margin-bottom: 28px; }
      .brand {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase;
        color: var(--accent); margin-bottom: 12px;
      }
      h1 { font-size: 32px; font-weight: 500; line-height: 1.2; margin: 0 0 8px; }
      h2 { font-size: 22px; font-weight: 500; margin: 0 0 6px; line-height: 1.3; }
      h3 {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--muted); font-weight: 500;
        margin: 32px 0 16px;
      }
      .sub { color: var(--muted); font-size: 15px; font-family: ui-sans-serif, system-ui, sans-serif; }
      .stage-label {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
        color: var(--accent); margin-bottom: 8px;
      }

      /* Resume banner */
      .resume-banner {
        background: var(--accent-soft); border: 1px solid var(--accent);
        border-radius: 6px; padding: 16px 20px; margin-bottom: 32px;
        font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px;
      }
      .resume-banner strong { color: var(--accent-hover); }
      .resume-banner .resume-q {
        display: block; color: var(--text); font-style: italic;
        margin: 8px 0 14px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .resume-banner .actions { margin-top: 0; }

      /* Decision mode picker */
      .mode-picker { margin: 0 0 24px; }
      .mode-picker .mode-label {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--muted); margin-bottom: 10px;
      }
      .mode-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 8px;
      }
      .mode-chip {
        background: var(--panel); border: 1px solid var(--border);
        color: var(--text);
        padding: 10px 14px; border-radius: 4px;
        font-family: ui-sans-serif, system-ui, sans-serif; font-size: 13px;
        cursor: pointer; text-align: left;
        transition: all 0.12s ease;
      }
      .mode-chip:hover { border-color: var(--accent); }
      .mode-chip.selected {
        border-color: var(--accent); background: var(--accent-soft);
        color: var(--accent-hover); font-weight: 600;
      }

      /* Form */
      textarea {
        width: 100%; min-height: 140px;
        padding: 16px 18px;
        background: var(--panel); color: var(--text);
        border: 1px solid var(--border); border-radius: 6px;
        font-family: inherit; font-size: 17px; line-height: 1.55;
        resize: vertical;
      }
      textarea:focus { outline: none; border-color: var(--accent); }
      textarea.small { min-height: 80px; font-size: 16px; }

      .actions {
        display: flex; align-items: center; gap: 12px;
        margin-top: 18px; flex-wrap: wrap;
      }
      button {
        background: var(--accent); color: #0e1116; border: 0;
        padding: 11px 22px;
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 14px; font-weight: 600;
        letter-spacing: 0.04em; text-transform: uppercase;
        border-radius: 4px; cursor: pointer;
        transition: background 0.15s ease;
      }
      button:hover:not(:disabled) { background: var(--accent-hover); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button.secondary {
        background: transparent; color: var(--text);
        border: 1px solid var(--border);
      }
      button.secondary:hover:not(:disabled) {
        border-color: var(--accent); color: var(--accent);
      }
      .hint {
        font-size: 13px; color: var(--muted);
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      /* Field rendering */
      .field { padding: 20px 0; border-top: 1px solid var(--border); }
      .field:first-child { border-top: 0; }
      .field .label {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--accent); margin-bottom: 8px;
      }
      .field p { margin: 0; }

      .followup {
        background: var(--panel); border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        padding: 18px 20px; margin-top: 24px; border-radius: 4px;
      }
      .followup .label { margin-bottom: 6px; }

      .banner {
        background: var(--accent-soft); border: 1px solid var(--accent);
        padding: 12px 16px; border-radius: 4px;
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 13px; color: var(--accent);
        margin-bottom: 24px;
      }
      .banner strong { color: var(--accent-hover); }

      /* Thinking Frame view */
      .thinking-block {
        background: var(--panel); border: 1px solid var(--border-soft);
        border-radius: 6px; padding: 8px 24px; margin: 0 0 28px;
      }
      .thinking-block .field { padding: 16px 0; border-color: var(--border-soft); }

      /* Iterative pressure test */
      .batch-progress {
        display: flex; gap: 10px; align-items: center;
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--muted); margin-bottom: 18px;
      }
      .batch-progress .pip {
        width: 22px; height: 4px; border-radius: 2px;
        background: var(--border);
      }
      .batch-progress .pip.done { background: var(--accent); }
      .batch-progress .pip.active { background: var(--accent-hover); }

      .update-block {
        background: var(--panel); border: 1px solid var(--border-soft);
        border-radius: 6px; padding: 4px 22px; margin: 0 0 24px;
      }
      .update-block .field { padding: 14px 0; border-color: var(--border-soft); }

      .pivot-callout {
        background: var(--pivot-soft); border: 1px solid var(--pivot);
        border-left: 4px solid var(--pivot);
        padding: 14px 18px; border-radius: 4px; margin: 0 0 20px;
      }
      .pivot-callout .pivot-tag {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
        color: var(--pivot); margin-bottom: 6px; font-weight: 700;
      }
      .pivot-callout p { margin: 0; }

      .narrowed-tag {
        display: inline-block;
        background: var(--accent-soft); color: var(--accent);
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
        padding: 2px 8px; border-radius: 3px; margin-left: 10px;
        vertical-align: middle;
      }

      .question-card {
        background: var(--panel-2); border: 1px solid var(--border-soft);
        border-left: 3px solid var(--accent);
        padding: 18px 20px; margin-bottom: 16px; border-radius: 4px;
      }
      .lever-badge {
        display: inline-block;
        background: var(--accent-soft); color: var(--accent);
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
        padding: 3px 10px; border-radius: 3px; margin-bottom: 10px;
      }
      .question-card .qtext-full { margin: 0 0 12px; font-size: 16px; }

      /* Errors / loading */
      .error {
        color: var(--error);
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 14px; margin-top: 24px;
      }
      .loading {
        color: var(--muted); font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 14px; font-style: italic; margin-top: 32px;
      }

      /* ─── Final recommendation — decision product ─────────────────────── */

      /* THE CALL — dominant block */
      .the-call {
        background: linear-gradient(180deg, rgba(201,168,106,0.10), rgba(201,168,106,0.04));
        border: 1px solid var(--accent);
        border-radius: 8px;
        padding: 28px 32px;
        margin: 0 0 28px;
      }
      .the-call .label {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 12px; letter-spacing: 0.20em; text-transform: uppercase;
        color: var(--accent); margin-bottom: 14px;
      }
      .the-call .lede {
        margin: 0 0 18px;
        font-size: 22px; line-height: 1.4; font-weight: 500;
        color: var(--text);
      }
      .the-call .call-blocks {
        display: grid;
        gap: 12px;
        margin: 0;
      }
      .the-call .call-block {
        background: rgba(14,17,22,0.45);
        border: 1px solid var(--border-soft);
        border-left: 3px solid var(--accent);
        border-radius: 4px;
        padding: 12px 16px;
      }
      .the-call .call-block .sub-label {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
        color: var(--accent); margin-bottom: 4px;
      }
      .the-call .call-block p {
        margin: 0;
        font-size: 16px; line-height: 1.5;
        color: var(--text);
      }
      .the-call p { margin: 0; }
      .the-call p + p { margin-top: 10px; }

      /* Action plan numbered list */
      .action-plan .plan-card ol {
        margin: 0;
        padding: 0;
        list-style: none;
        counter-reset: action;
      }
      .action-plan .plan-card ol li {
        counter-increment: action;
        position: relative;
        padding: 4px 0 4px 26px;
        font-size: 15px;
        line-height: 1.5;
      }
      .action-plan .plan-card ol li::before {
        content: counter(action);
        position: absolute;
        left: 0; top: 4px;
        width: 18px; height: 18px;
        border-radius: 50%;
        background: var(--accent-soft);
        color: var(--accent);
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 11px; font-weight: 700;
        line-height: 18px; text-align: center;
      }
      .action-plan .plan-card ol li + li {
        margin-top: 4px;
        border-top: 1px solid var(--border-soft);
        padding-top: 10px;
      }
      .action-plan .plan-card ol li + li::before { top: 10px; }

      /* Watch-signals numbered list */
      .watch-signals .signal ol {
        margin: 0;
        padding: 0;
        list-style: none;
        counter-reset: signal;
      }
      .watch-signals .signal ol li {
        counter-increment: signal;
        position: relative;
        padding: 4px 0 4px 22px;
        font-size: 15px;
        line-height: 1.5;
      }
      .watch-signals .signal ol li::before {
        content: counter(signal) ".";
        position: absolute;
        left: 0; top: 4px;
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 12px; font-weight: 700;
        color: var(--muted);
      }
      .watch-signals .signal ol li + li {
        margin-top: 4px;
        border-top: 1px solid var(--border-soft);
        padding-top: 10px;
      }
      .watch-signals .signal ol li + li::before { top: 10px; }

      /* WHY THIS IS TRUE — bullets */
      .why-block {
        margin: 0 0 28px;
      }
      .why-block ul {
        list-style: none; padding: 0; margin: 0;
      }
      .why-block li {
        position: relative;
        padding: 10px 0 10px 26px;
        border-top: 1px solid var(--border-soft);
      }
      .why-block li:first-child { border-top: 0; }
      .why-block li::before {
        content: ""; position: absolute;
        left: 0; top: 18px;
        width: 8px; height: 8px;
        background: var(--accent); border-radius: 50%;
      }

      /* WHAT THIS BREAKS — three stacked rows */
      .breaks-block {
        background: var(--panel);
        border: 1px solid var(--border);
        border-left: 3px solid var(--pivot);
        border-radius: 6px;
        padding: 4px 22px;
        margin: 0 0 28px;
      }
      .breaks-block .field { padding: 16px 0; border-color: var(--border-soft); }
      .breaks-block .field .label { color: var(--pivot); }

      /* THE PROOF TEST — callout */
      .proof-test {
        background: var(--panel);
        border: 1px solid var(--accent);
        border-radius: 8px;
        padding: 22px 26px;
        margin: 0 0 28px;
      }
      .proof-test .proof-header {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
        color: var(--accent); margin: 0 0 14px;
        display: flex; align-items: center; justify-content: space-between;
        flex-wrap: wrap; gap: 10px;
      }
      .proof-test .deadline-tag {
        background: var(--accent); color: #0e1116;
        padding: 4px 12px; border-radius: 3px;
        font-weight: 700; letter-spacing: 0.06em;
      }
      .proof-test .what-tested {
        font-size: 17px; line-height: 1.5;
        margin: 0 0 18px;
      }
      .proof-thresholds {
        display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
      }
      .proof-thresholds .threshold {
        background: var(--panel-2);
        border: 1px solid var(--border-soft);
        border-radius: 4px;
        padding: 14px 16px;
      }
      .proof-thresholds .threshold.pass { border-left: 3px solid var(--go); }
      .proof-thresholds .threshold.fail { border-left: 3px solid var(--error); }
      .proof-thresholds .threshold .label {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
        margin-bottom: 8px;
      }
      .proof-thresholds .threshold.pass .label { color: var(--go); }
      .proof-thresholds .threshold.fail .label { color: var(--error); }
      .proof-thresholds .threshold p { margin: 0; font-size: 15px; }

      /* ACTION PLAN — four cards */
      .action-plan {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        margin: 0 0 14px;
      }
      .action-plan .plan-card {
        background: var(--panel);
        border: 1px solid var(--border-soft);
        border-radius: 6px;
        padding: 16px 18px;
      }
      .action-plan .plan-card .label {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--accent); margin-bottom: 8px;
      }
      .action-plan .plan-card p { margin: 0; font-size: 15px; }

      .deliberate-delay {
        background: var(--pivot-soft);
        border: 1px solid var(--pivot);
        border-left: 4px solid var(--pivot);
        border-radius: 6px;
        padding: 16px 20px;
        margin: 0 0 28px;
      }
      .deliberate-delay .label {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--pivot); margin-bottom: 6px;
      }
      .deliberate-delay p { margin: 0; }

      /* WATCH SIGNALS — three columns, traffic-light */
      .watch-signals {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        margin: 0 0 28px;
      }
      .watch-signals .signal {
        background: var(--panel-2);
        border: 1px solid var(--border-soft);
        border-radius: 6px;
        padding: 16px 18px;
      }
      .watch-signals .signal.continue { border-top: 3px solid var(--go); }
      .watch-signals .signal.stop { border-top: 3px solid var(--error); }
      .watch-signals .signal.reconsider { border-top: 3px solid var(--pivot); }
      .watch-signals .signal .label {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
        margin-bottom: 8px;
      }
      .watch-signals .signal.continue .label { color: var(--go); }
      .watch-signals .signal.stop .label { color: var(--error); }
      .watch-signals .signal.reconsider .label { color: var(--pivot); }
      .watch-signals .signal p { margin: 0; font-size: 15px; }

      /* MEMORY FOR NEXT TIME — compact */
      .memory-block {
        background: var(--panel-2);
        border: 1px dashed var(--border);
        border-radius: 6px;
        padding: 18px 22px;
        margin: 32px 0 0;
      }
      .memory-block .memory-header {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
        color: var(--muted); margin: 0 0 14px;
        display: flex; align-items: center; gap: 10px;
      }
      .memory-block .memory-header::before {
        content: ""; display: inline-block;
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--accent);
      }
      .memory-block .memory-summary-line {
        font-size: 16px;
        line-height: 1.55;
        color: var(--text);
        padding: 4px 0 14px;
        margin: 0 0 10px;
        border-bottom: 1px solid var(--border-soft);
      }
      .memory-block .memory-summary-line p { margin: 0; }
      .memory-block .memory-row {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 14px;
        padding: 8px 0;
        border-top: 1px solid var(--border-soft);
        font-size: 14px;
      }
      .memory-block .memory-row:first-of-type { border-top: 0; }
      .memory-block .memory-row .k {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
        color: var(--muted);
        padding-top: 2px;
      }
      .memory-block .memory-row .v p { margin: 0; }

      .section-rule {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
        color: var(--muted);
        margin: 32px 0 14px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border-soft);
      }

      /* Subordinate post-CTA restart link */
      .start-over-row {
        margin: 18px 0 0;
        text-align: left;
      }
      .start-over-link {
        background: transparent;
        color: var(--muted);
        border: 0;
        padding: 4px 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: none;
        font-weight: 400;
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 4px;
        opacity: 0.75;
      }
      .start-over-link:hover { color: var(--accent); opacity: 1; }

      /* ─── Post-final monetisation CTA ──────────────────────────────────── */
      .cta-block {
        margin: 40px 0 0;
        padding: 28px 0 0;
        border-top: 1px solid var(--border-soft);
      }
      .cta-block .cta-heading {
        font-family: ui-serif, Georgia, "Times New Roman", serif;
        font-size: 22px; line-height: 1.3; font-weight: 500;
        color: var(--text);
        margin: 0 0 10px;
      }
      .cta-block .cta-body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 14px; line-height: 1.55;
        color: var(--muted);
        margin: 0 0 22px;
        max-width: 640px;
      }
      .cta-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin: 0 0 18px;
      }
      .cta-card {
        position: relative;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 22px 22px 24px;
        display: flex; flex-direction: column;
      }
      .cta-card.featured {
        border-color: var(--accent);
        background: linear-gradient(180deg, rgba(201,168,106,0.08), rgba(201,168,106,0.02));
        box-shadow: 0 0 0 1px var(--accent) inset;
      }
      .cta-card .cta-badge {
        position: absolute;
        top: -10px; left: 18px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--muted);
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
        padding: 3px 10px; border-radius: 3px;
      }
      .cta-card.featured .cta-badge {
        background: var(--accent);
        border-color: var(--accent);
        color: #0e1116;
        font-weight: 700;
      }
      .cta-card .cta-title {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
        color: var(--accent);
        margin: 0 0 8px;
      }
      .cta-card .cta-price {
        font-family: ui-serif, Georgia, "Times New Roman", serif;
        font-size: 28px; line-height: 1.1; font-weight: 500;
        color: var(--text);
        margin: 0 0 6px;
      }
      .cta-card .cta-price .per {
        font-size: 14px; color: var(--muted);
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-weight: 400;
      }
      .cta-card .cta-subtext {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 13px; color: var(--muted);
        margin: 0 0 14px;
      }
      .cta-card ul.cta-bullets {
        list-style: none; margin: 0 0 18px; padding: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 14px;
      }
      .cta-card ul.cta-bullets li {
        position: relative;
        padding: 4px 0 4px 18px;
        line-height: 1.5;
      }
      .cta-card ul.cta-bullets li::before {
        content: "";
        position: absolute;
        left: 0; top: 12px;
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--accent-soft);
        border: 1px solid var(--accent);
      }
      .cta-card .cta-button {
        margin-top: auto;
        width: 100%;
      }
      .cta-card.featured .cta-button {
        background: var(--accent);
        color: #0e1116;
      }
      .cta-card:not(.featured) .cta-button {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }
      .cta-card:not(.featured) .cta-button:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--accent);
      }
      .cta-trust {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 13px; line-height: 1.55;
        color: var(--muted);
        font-style: italic;
        margin: 4px 0 18px;
        max-width: 640px;
      }
      @media (max-width: 720px) {
        .proof-thresholds { grid-template-columns: 1fr; }
        .action-plan { grid-template-columns: 1fr; }
        .watch-signals { grid-template-columns: 1fr; }
        .memory-block .memory-row { grid-template-columns: 1fr; gap: 4px; }
        .context-bar { flex-wrap: wrap; }
        .cta-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="context-bar"></div>
    <div class="wrap" id="app"></div>

    <script>
      // ─── Config ─────────────────────────────────────────────────────────
      const STORAGE_KEY = "strategyscale.journey";
      const MEMORY_KEY = "strategyscale.lastMemory";
      const STATE_VERSION = 5; // bump when state shape changes
      const MAX_BATCHES = 3;

      const DECISION_MODES = [
        "market_entry",
        "pricing_strategy",
        "product_market_fit",
        "growth_constraint",
        "hiring_team",
        "fundraising_capital_allocation",
        "exit_succession",
        "other",
      ];
      const MODE_LABELS = {
        market_entry: "Market entry",
        pricing_strategy: "Pricing strategy",
        product_market_fit: "Product–market fit",
        growth_constraint: "Growth constraint",
        hiring_team: "Hiring / team",
        fundraising_capital_allocation: "Fundraising / capital",
        exit_succession: "Exit / succession",
        other: "Other / free text",
      };

      // ─── State ──────────────────────────────────────────────────────────
      function freshState() {
        return {
          version: STATE_VERSION,
          view: "INPUT", // INPUT | INSTANT | THINKING | PRESSURE_TEST | FINAL
          loading: false,
          loadingMsg: "",
          error: null,
          question: "",
          selectedMode: "other",
          instantView: null,
          thinkingFrame: null,
          // batches: [
          //   {
          //     questions: [{question, decision_lever}],
          //     answers: [string],
          //     update: null | {
          //       what_we_now_know, still_uncertain,
          //       framing_status, framing_change_explanation,
          //       decision, reason
          //     }
          //   }
          // ]
          batches: [],
          finalRec: null,
          savedJourney: null, // not persisted
        };
      }
      let state = freshState();

      // ─── Persistence ────────────────────────────────────────────────────
      function persist() {
        try {
          const { savedJourney, loading, loadingMsg, error, ...persistable } = state;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(persistable));
        } catch {}
      }
      function loadSaved() {
        try {
          const s = localStorage.getItem(STORAGE_KEY);
          if (!s) return null;
          const obj = JSON.parse(s);
          if (!obj || obj.version !== STATE_VERSION) return null;
          if (!obj.question || !obj.view) return null;
          return obj;
        } catch { return null; }
      }
      function clearSaved() {
        try { localStorage.removeItem(STORAGE_KEY); } catch {}
      }
      function persistMemory(mem) {
        try { localStorage.setItem(MEMORY_KEY, JSON.stringify(mem)); } catch {}
      }

      // ─── Utils ──────────────────────────────────────────────────────────
      function escapeHtml(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }
      function paragraphs(s) {
        return escapeHtml(s).replace(/\n+/g, "</p><p>");
      }

      // THE CALL parser. Splits on the three labels (CORE CALL:, ONLY PROCEED IF:,
      // COUNTER WITH:) — anything before the first label is the lede. Returns
      // { lede, blocks } where blocks is [] when the model returned a single
      // unstructured call. Labels are matched on their own line, case-insensitive.
      const CALL_LABEL_RE = /^\s*(CORE CALL|ONLY PROCEED IF|COUNTER WITH)\s*:\s*$/i;
      function parseCallBlocks(call) {
        if (!call) return { lede: "", blocks: [] };
        const lines = String(call).split(/\r?\n/);
        const blocks = [];
        const ledeLines = [];
        let current = null;
        for (const line of lines) {
          const m = line.match(CALL_LABEL_RE);
          if (m) {
            if (current) blocks.push(current);
            current = { label: m[1].toUpperCase(), lines: [] };
          } else if (current) {
            current.lines.push(line);
          } else {
            ledeLines.push(line);
          }
        }
        if (current) blocks.push(current);
        return {
          lede: ledeLines.join("\n").trim(),
          blocks: blocks.map((b) => ({ label: b.label, text: b.lines.join("\n").trim() })),
        };
      }

      // Numbered-list parser for ACTION PLAN cards and WATCH SIGNALS columns.
      // Returns array of strings if the input parses as "1. ... 2. ... 3. ...",
      // otherwise null (caller falls back to paragraphs()).
      function parseNumberedList(s) {
        if (!s) return null;
        const text = String(s).trim();
        if (!/^\s*\d+\.\s+/.test(text)) return null;
        const parts = text.split(/\n+/).map((l) => l.trim()).filter(Boolean);
        const items = [];
        let buf = null;
        for (const p of parts) {
          const m = p.match(/^\s*\d+\.\s+(.*)$/);
          if (m) {
            if (buf) items.push(buf);
            buf = m[1];
          } else if (buf) {
            buf += " " + p;
          }
        }
        if (buf) items.push(buf);
        return items.length > 0 ? items : null;
      }

      function renderNumberedList(s) {
        const items = parseNumberedList(s);
        if (!items) return `<p>${paragraphs(s)}</p>`;
        return `<ol>${items.map((i) => `<li>${escapeHtml(i)}</li>`).join("")}</ol>`;
      }
      async function postJSON(url, body) {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        return data;
      }
      function activeMode() {
        return state.instantView?.detected_mode || state.selectedMode;
      }
      function captureCurrentAnswers() {
        const inputs = document.querySelectorAll("textarea[data-q]");
        if (!inputs.length || !state.batches.length) return;
        const last = state.batches[state.batches.length - 1];
        last.answers = Array.from(inputs).map((t) => t.value);
      }

      // ─── State transitions ──────────────────────────────────────────────
      async function submitDecision(question) {
        state.question = question;
        state.loading = true;
        state.loadingMsg = "Reading your decision...";
        state.error = null;
        render();
        try {
          state.instantView = await postJSON("/api/instant-view", {
            question,
            mode: state.selectedMode,
          });
          state.view = "INSTANT";
          persist();
        } catch (e) {
          state.error = e.message;
        } finally {
          state.loading = false;
          render();
        }
      }

      async function startDiagnostic() {
        state.loading = true;
        state.loadingMsg = "Selecting framework and drafting batch 1...";
        state.error = null;
        render();
        try {
          const result = await postJSON("/api/diagnostic/start", {
            question: state.question,
            mode: activeMode(),
            instantView: state.instantView,
          });
          // Split: thinking-frame fields vs. first batch questions
          const { pressure_test_questions, ...frame } = result;
          state.thinkingFrame = frame;
          state.batches = [
            {
              questions: pressure_test_questions,
              answers: pressure_test_questions.map(() => ""),
              update: null,
            },
          ];
          state.view = "THINKING";
          persist();
        } catch (e) {
          state.error = e.message;
        } finally {
          state.loading = false;
          render();
        }
      }

      function showFirstBatch() {
        state.view = "PRESSURE_TEST";
        persist();
        render();
      }

      async function submitBatch() {
        captureCurrentAnswers();
        state.loading = true;
        state.loadingMsg = "Reading your answers, deciding next step...";
        state.error = null;
        render();
        try {
          const update = await postJSON("/api/diagnostic/iterate", {
            question: state.question,
            mode: activeMode(),
            instantView: state.instantView,
            thinkingFrame: state.thinkingFrame,
            batches: state.batches,
          });
          // Strip next_questions onto its own thing; the rest is the update.
          const { next_questions, ...rest } = update;
          state.batches[state.batches.length - 1].update = rest;
          if (rest.decision === "continue" && Array.isArray(next_questions) && next_questions.length > 0) {
            state.batches.push({
              questions: next_questions,
              answers: next_questions.map(() => ""),
              update: null,
            });
            persist();
            state.loading = false;
            render();
          } else {
            // Finalise
            persist();
            await produceFinal();
          }
        } catch (e) {
          state.error = e.message;
          state.loading = false;
          render();
        }
      }

      async function wrapUpNow() {
        captureCurrentAnswers();
        await produceFinal();
      }

      async function produceFinal() {
        state.loading = true;
        state.loadingMsg = "Producing the final recommendation...";
        state.error = null;
        state.view = "FINAL";
        render();
        try {
          state.finalRec = await postJSON("/api/final", {
            question: state.question,
            mode: activeMode(),
            instantView: state.instantView,
            thinkingFrame: state.thinkingFrame,
            batches: state.batches,
          });
          if (state.finalRec.memory_for_next_time) {
            persistMemory(state.finalRec.memory_for_next_time);
          }
          persist();
        } catch (e) {
          state.error = e.message;
          state.view = "PRESSURE_TEST";
        } finally {
          state.loading = false;
          render();
        }
      }

      function restart() {
        clearSaved();
        state = freshState();
        render();
      }

      function continueSaved() {
        const saved = state.savedJourney;
        if (!saved) return;
        state = { ...freshState(), ...saved, savedJourney: null };
        render();
      }

      function discardSaved() {
        clearSaved();
        state.savedJourney = null;
        render();
      }

      function selectMode(mode) {
        state.selectedMode = mode;
        render();
      }

      // ─── Rendering ──────────────────────────────────────────────────────
      function renderContextBar() {
        const bar = document.getElementById("context-bar");
        if (state.view === "INPUT") {
          bar.innerHTML = "";
          bar.style.display = "none";
          return;
        }
        bar.style.display = "flex";
        bar.className = "context-bar";
        const detected = state.instantView?.detected_mode;
        const modeTag = detected
          ? `<span class="mode-tag">${escapeHtml(MODE_LABELS[detected] || detected)}</span>`
          : "";
        bar.innerHTML = `
          <span class="label">Decision</span>
          <span class="qtext" title="${escapeHtml(state.question)}">${escapeHtml(state.question)}</span>
          ${modeTag}
          <a href="#" class="restart" id="restart-link">Start over</a>
        `;
        document.getElementById("restart-link").addEventListener("click", (e) => {
          e.preventDefault();
          if (confirm("Start over? Current decision will be cleared.")) restart();
        });
      }

      function renderResumeBanner() {
        if (!state.savedJourney) return "";
        const sj = state.savedJourney;
        const stageLabels = {
          INSTANT: "Instant view ready",
          THINKING: "Thinking frame ready",
          PRESSURE_TEST: `Mid pressure-test (batch ${sj.batches?.length || 1} of ${MAX_BATCHES})`,
          FINAL: "Final recommendation ready",
        };
        return `
          <div class="resume-banner">
            <strong>You have an unfinished decision.</strong> Stage: ${escapeHtml(stageLabels[sj.view] || sj.view)}.
            <span class="resume-q">"${escapeHtml(sj.question)}"</span>
            <div class="actions">
              <button id="resume-continue">Continue</button>
              <button class="secondary" id="resume-discard">Discard and start fresh</button>
            </div>
          </div>
        `;
      }

      function renderModePicker() {
        const chips = DECISION_MODES.map((m) => `
          <button type="button" class="mode-chip ${state.selectedMode === m ? "selected" : ""}" data-mode="${m}">
            ${escapeHtml(MODE_LABELS[m])}
          </button>
        `).join("");
        return `
          <div class="mode-picker">
            <div class="mode-label">Decision mode</div>
            <div class="mode-grid">${chips}</div>
          </div>
        `;
      }

      function renderInput() {
        return `
          ${renderResumeBanner()}
          <header class="brand-header">
            <div class="brand">StrategyScale</div>
            <h1>What strategic decision are you trying to make?</h1>
            <div class="sub">Be specific. Vague inputs get pushed back, not flattered.</div>
          </header>
          ${renderModePicker()}
          <form id="form">
            <textarea
              id="question"
              placeholder="e.g. Whether to acquire our smaller German competitor for €45m, or build the same capability in-house over 18 months."
              autofocus required
            >${escapeHtml(state.question)}</textarea>
            <div class="actions">
              <button type="submit" id="submit">Get instant view</button>
              <span class="hint">Cmd/Ctrl + Enter to submit</span>
            </div>
          </form>
          ${renderError()}
        `;
      }

      function renderInstant() {
        const v = state.instantView;
        return `
          <div class="stage-label">Stage 1 · Instant view</div>
          <h2>Provisional read</h2>
          <div class="banner"><strong>Provisional.</strong> Based only on your opening brief. Take it in, then go deeper to refine it.</div>
          <div class="field"><div class="label">Provisional position</div><p>${paragraphs(v.provisional_position)}</p></div>
          <div class="field"><div class="label">Single dominant constraint</div><p>${paragraphs(v.dominant_constraint)}</p></div>
          <div class="field"><div class="label">Assumption to test</div><p>${paragraphs(v.assumption_to_test)}</p></div>
          <div class="followup">
            <div class="label">Immediate next move</div>
            <p>${paragraphs(v.immediate_next_move)}</p>
          </div>
          <div class="actions">
            <button id="go-deeper">Take me deeper</button>
            <button class="secondary" id="have-enough">I have what I need</button>
          </div>
          ${renderError()}
        `;
      }

      function renderThinking() {
        if (state.loading) return `<div class="stage-label">Stage 2 · Thinking frame</div><div class="loading">${escapeHtml(state.loadingMsg)}</div>`;
        const t = state.thinkingFrame;
        if (!t) return renderError();
        return `
          <div class="stage-label">Stage 2 · Thinking frame</div>
          <h2>Why these questions, in this order</h2>
          <div class="thinking-block">
            <div class="field"><div class="label">Problem type</div><p>${paragraphs(t.problem_type)}</p></div>
            <div class="field"><div class="label">Framework selected</div><p>${paragraphs(t.framework_selected)}</p></div>
            <div class="field"><div class="label">Why this framework fits</div><p>${paragraphs(t.why_framework_fits)}</p></div>
            <div class="field"><div class="label">Key tension</div><p>${paragraphs(t.key_tension)}</p></div>
            <div class="field"><div class="label">Critical unknown</div><p>${paragraphs(t.critical_unknown)}</p></div>
            <div class="field"><div class="label">Why these questions matter</div><p>${paragraphs(t.why_these_questions_matter)}</p></div>
          </div>
          <div class="actions">
            <button id="show-questions">Show me the questions</button>
          </div>
          ${renderError()}
        `;
      }

      function renderBatchProgress(currentIdx) {
        const pips = [];
        for (let i = 0; i < MAX_BATCHES; i++) {
          const cls = i < currentIdx ? "done" : i === currentIdx ? "active" : "";
          pips.push(`<span class="pip ${cls}"></span>`);
        }
        return `<div class="batch-progress">Batch ${currentIdx + 1} of max ${MAX_BATCHES} ${pips.join("")}</div>`;
      }

      function renderUpdateBlock(update) {
        if (!update) return "";
        const pivot = update.framing_status === "pivoted"
          ? `<div class="pivot-callout">
               <div class="pivot-tag">Framing pivoted — we are solving a different problem</div>
               <p>${paragraphs(update.framing_change_explanation)}</p>
             </div>`
          : "";
        const narrowedTag = update.framing_status === "narrowed"
          ? `<span class="narrowed-tag">Framing narrowed</span>`
          : "";
        return `
          ${pivot}
          <div class="update-block">
            <div class="field"><div class="label">What we now know${narrowedTag}</div><p>${paragraphs(update.what_we_now_know)}</p></div>
            <div class="field"><div class="label">Still uncertain</div><p>${paragraphs(update.still_uncertain)}</p></div>
            <div class="field"><div class="label">Why we are continuing</div><p>${paragraphs(update.reason)}</p></div>
          </div>
        `;
      }

      function renderPressureTest() {
        if (!state.batches.length) return renderError();
        const idx = state.batches.length - 1;
        const batch = state.batches[idx];
        const previousUpdate = idx > 0 ? state.batches[idx - 1].update : null;
        const isLastAllowed = idx === MAX_BATCHES - 1;

        const questionsHtml = batch.questions.map((q, i) => `
          <div class="question-card">
            <div class="lever-badge">${escapeHtml(q.decision_lever)}</div>
            <p class="qtext-full">${escapeHtml(q.question)}</p>
            <textarea class="small" data-q="${i}" placeholder="Your answer (or leave blank — that's a signal too)">${escapeHtml(batch.answers[i] || "")}</textarea>
          </div>
        `).join("");

        const headline = idx === 0
          ? `<h2>${batch.questions.length} opening questions</h2>`
          : `<h2>${batch.questions.length} sharper questions${isLastAllowed ? ` (final batch)` : ""}</h2>`;

        return `
          <div class="stage-label">Stage 3 · Pressure test</div>
          ${renderBatchProgress(idx)}
          ${headline}
          ${renderUpdateBlock(previousUpdate)}
          ${questionsHtml}
          <div class="actions">
            <button id="submit-batch" ${state.loading ? "disabled" : ""}>${state.loading ? "Thinking..." : (isLastAllowed ? "Submit answers — generate final" : "Submit answers")}</button>
            <button class="secondary" id="wrap-up" ${state.loading ? "disabled" : ""}>Wrap up — give me the final now</button>
          </div>
          ${state.loading ? `<div class="loading">${escapeHtml(state.loadingMsg)}</div>` : ""}
          ${renderError()}
        `;
      }

      function renderFinal() {
        console.log("[StrategyScale] renderFinal()", { hasFinalRec: !!state.finalRec, loading: state.loading });
        if (state.loading || !state.finalRec) {
          return `<div class="stage-label">Stage 4 · Final recommendation</div><div class="loading">${escapeHtml(state.loadingMsg || "Working...")}</div>${renderError()}`;
        }
        const f = state.finalRec;
        const breaks = f.what_this_breaks || {};
        const proof = f.proof_test || {};
        const plan = f.action_plan || {};
        const watch = f.watch_signals || {};
        const memory = f.memory_for_next_time || {};

        const whyBullets = (Array.isArray(f.why_this_is_true) ? f.why_this_is_true : [])
          .map((b) => `<li>${paragraphs(b)}</li>`).join("");

        const callParsed = parseCallBlocks(f.the_call);
        const callBlocksHtml = callParsed.blocks.length
          ? `<div class="call-blocks">
              ${callParsed.blocks.map((b) => `
                <div class="call-block">
                  <div class="sub-label">${escapeHtml(b.label)}</div>
                  <p>${paragraphs(b.text)}</p>
                </div>
              `).join("")}
            </div>`
          : "";
        const callLedeHtml = callParsed.lede
          ? `<p class="lede">${paragraphs(callParsed.lede)}</p>`
          : (!callBlocksHtml ? `<p class="lede">${paragraphs(f.the_call)}</p>` : "");

        return `
          <div class="stage-label">Stage 4 · Final recommendation</div>

          <div class="the-call">
            <div class="label">The call</div>
            ${callLedeHtml}
            ${callBlocksHtml}
          </div>

          <div class="section-rule">Why this is true</div>
          <div class="why-block">
            <ul>${whyBullets}</ul>
          </div>

          <div class="section-rule">What this breaks</div>
          <div class="breaks-block">
            <div class="field"><div class="label">Deprioritised</div><p>${paragraphs(breaks.deprioritised)}</p></div>
            <div class="field"><div class="label">Resistance</div><p>${paragraphs(breaks.resistance)}</p></div>
            <div class="field"><div class="label">Uncomfortable trade-off</div><p>${paragraphs(breaks.uncomfortable_tradeoff)}</p></div>
          </div>

          <div class="proof-test">
            <div class="proof-header">
              <span>The proof test</span>
              <span class="deadline-tag">${escapeHtml(proof.deadline || "")}</span>
            </div>
            <p class="what-tested">${paragraphs(proof.what)}</p>
            <div class="proof-thresholds">
              <div class="threshold pass">
                <div class="label">Pass — confirms the call</div>
                <p>${paragraphs(proof.pass_threshold)}</p>
              </div>
              <div class="threshold fail">
                <div class="label">Fail — abandon or pivot</div>
                <p>${paragraphs(proof.fail_threshold)}</p>
              </div>
            </div>
          </div>

          <div class="section-rule">Action plan</div>
          <div class="action-plan">
            <div class="plan-card">
              <div class="label">First 7 days</div>
              ${renderNumberedList(plan.first_7_days)}
            </div>
            <div class="plan-card">
              <div class="label">First 30 days</div>
              ${renderNumberedList(plan.first_30_days)}
            </div>
            <div class="plan-card">
              <div class="label">Days 60 – 90</div>
              ${renderNumberedList(plan.first_60_to_90_days)}
            </div>
          </div>
          <div class="deliberate-delay">
            <div class="label">Deliberate delay — do NOT do yet</div>
            <p>${paragraphs(plan.deliberate_delay)}</p>
          </div>

          <div class="section-rule">Watch signals</div>
          <div class="watch-signals">
            <div class="signal continue">
              <div class="label">Continue if</div>
              ${renderNumberedList(watch.continue_if)}
            </div>
            <div class="signal stop">
              <div class="label">Stop or pivot if</div>
              ${renderNumberedList(watch.stop_or_pivot_if)}
            </div>
            <div class="signal reconsider">
              <div class="label">Reconsider if</div>
              ${renderNumberedList(watch.reconsider_if)}
            </div>
          </div>

          <div class="memory-block">
            <div class="memory-header">Memory for next time</div>
            ${memory.memory_summary ? `<div class="memory-summary-line"><p>${paragraphs(memory.memory_summary)}</p></div>` : ""}
            <div class="memory-row"><div class="k">User goal</div><div class="v"><p>${paragraphs(memory.user_goal)}</p></div></div>
            <div class="memory-row"><div class="k">Key constraint</div><div class="v"><p>${paragraphs(memory.key_constraint)}</p></div></div>
            <div class="memory-row"><div class="k">Current decision gate</div><div class="v"><p>${paragraphs(memory.current_decision_gate)}</p></div></div>
            <div class="memory-row"><div class="k">Evidence gap</div><div class="v"><p>${paragraphs(memory.evidence_gap)}</p></div></div>
          </div>

          ${renderMonetisationCta()}

          <div class="start-over-row">
            <button type="button" class="start-over-link" id="restart-final">Start over</button>
          </div>
        `;
      }

      function renderMonetisationCta() {
        console.log("[StrategyScale] renderMonetisationCta() called");
        return `
          <div class="cta-block">
            <h3 class="cta-heading">Keep working the decision</h3>
            <p class="cta-body">You've completed your free StrategyScale decision brief. The recommendation is useful now — but the value compounds when you save the decision, track the proof test, and come back with new evidence.</p>

            <div class="cta-grid">
              <div class="cta-card">
                <span class="cta-badge">Best for one-off pressure-test</span>
                <div class="cta-title">Decision Pass</div>
                <div class="cta-price">£49</div>
                <div class="cta-subtext">Run another saved decision brief</div>
                <ul class="cta-bullets">
                  <li>One additional full decision</li>
                  <li>Save the recommendation and decision memory</li>
                  <li>Export a board-ready brief</li>
                  <li>Revisit the proof test when new evidence arrives</li>
                </ul>
                <button type="button" class="cta-button" data-cta="pass">Buy another decision</button>
              </div>

              <div class="cta-card featured">
                <span class="cta-badge">Best for repeated decisions</span>
                <div class="cta-title">Founder Plan</div>
                <div class="cta-price">£49<span class="per"> /month</span></div>
                <div class="cta-subtext">For CEOs making repeated strategic calls</div>
                <ul class="cta-bullets">
                  <li>5 decision briefs per month</li>
                  <li>Saved decision memory</li>
                  <li>Exportable board-ready summaries</li>
                  <li>30/60/90-day proof-test tracking</li>
                  <li>Early founder pricing</li>
                </ul>
                <button type="button" class="cta-button" data-cta="founder">Start Founder Plan</button>
              </div>
            </div>

            <p class="cta-trust">StrategyScale is not selling more dashboards. It helps you pressure-test decisions before you commit money, people or reputation.</p>
          </div>
        `;
      }

      function renderError() {
        return state.error ? `<div class="error">${escapeHtml(state.error)}</div>` : "";
      }
      function renderLoading() {
        return `<div class="loading">${escapeHtml(state.loadingMsg)}</div>`;
      }

      function render() {
        renderContextBar();
        const app = document.getElementById("app");
        let html = "";
        if (state.view === "INPUT") {
          html = state.loading ? renderLoading() : renderInput();
        } else if (state.view === "INSTANT") {
          html = state.loading ? renderLoading() : renderInstant();
        } else if (state.view === "THINKING") {
          html = renderThinking();
        } else if (state.view === "PRESSURE_TEST") {
          html = renderPressureTest();
        } else if (state.view === "FINAL") {
          html = renderFinal();
        }
        app.innerHTML = html;
        wireHandlers();
      }

      // ─── Event wiring (re-bound after every render) ─────────────────────
      function wireHandlers() {
        document.querySelectorAll(".mode-chip").forEach((el) => {
          el.addEventListener("click", () => selectMode(el.dataset.mode));
        });

        const cont = document.getElementById("resume-continue");
        if (cont) cont.addEventListener("click", continueSaved);
        const disc = document.getElementById("resume-discard");
        if (disc) disc.addEventListener("click", discardSaved);

        const form = document.getElementById("form");
        if (form) {
          const ta = document.getElementById("question");
          ta.addEventListener("keydown", (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === "Enter") form.requestSubmit();
          });
          form.addEventListener("submit", (e) => {
            e.preventDefault();
            const q = ta.value.trim();
            if (q.length < 10) return;
            submitDecision(q);
          });
        }

        const goDeeper = document.getElementById("go-deeper");
        if (goDeeper) goDeeper.addEventListener("click", startDiagnostic);
        const haveEnough = document.getElementById("have-enough");
        if (haveEnough) haveEnough.addEventListener("click", () => {
          alert("Right — instant view is your answer. Take it to the board.");
        });

        const showQ = document.getElementById("show-questions");
        if (showQ) showQ.addEventListener("click", showFirstBatch);

        const submitB = document.getElementById("submit-batch");
        if (submitB) submitB.addEventListener("click", submitBatch);
        const wrapUp = document.getElementById("wrap-up");
        if (wrapUp) wrapUp.addEventListener("click", wrapUpNow);

        const restartF = document.getElementById("restart-final");
        if (restartF) restartF.addEventListener("click", restart);

        document.querySelectorAll(".cta-button[data-cta]").forEach((el) => {
          el.addEventListener("click", () => {
            alert("Payment is not live in this prototype. This is testing pricing and demand.");
          });
        });
      }

      // ─── Boot ───────────────────────────────────────────────────────────
      function boot() {
        const saved = loadSaved();
        if (saved && saved.view !== "INPUT") {
          state.savedJourney = saved;
        }
        render();
      }
      boot();
    </script>
  </body>
</html>
